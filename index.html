<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Terry">
<meta name="theme-color" content="#0a0e17">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>Talk to Terry ⚡</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cyan: #00d4ff;
    --cyan-dim: #00d4ff44;
    --cyan-glow: #00d4ff88;
    --blue: #0066ff;
    --bg: #0a0e17;
    --bg-card: #0d1220;
    --bg-card-border: #1a2744;
    --text: #c8dce8;
    --text-dim: #5a7a90;
    --danger: #ff3a5c;
    --success: #00ff88;
  }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', 'Segoe UI', sans-serif;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  /* ── Animated background grid ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%, #001a3a 0%, transparent 60%),
      linear-gradient(180deg, transparent 0%, var(--bg) 100%);
    z-index: 0;
    pointer-events: none;
  }

  .grid-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(var(--cyan-dim) 1px, transparent 1px),
      linear-gradient(90deg, var(--cyan-dim) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.06;
    animation: gridPulse 8s ease-in-out infinite;
  }
  @keyframes gridPulse {
    0%, 100% { opacity: 0.04; }
    50% { opacity: 0.08; }
  }

  /* ── Header ── */
  .header {
    position: relative; z-index: 10;
    text-align: center;
    padding: 20px 16px 8px;
    flex-shrink: 0;
  }
  .header h1 {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 1.1rem;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--cyan);
    text-shadow: 0 0 20px var(--cyan-glow), 0 0 60px var(--cyan-dim);
  }
  .header .subtitle {
    font-size: 0.7rem;
    letter-spacing: 4px;
    color: var(--text-dim);
    margin-top: 4px;
    text-transform: uppercase;
  }

  /* ── Status bar ── */
  .status-bar {
    position: relative; z-index: 10;
    text-align: center;
    padding: 6px 16px;
    flex-shrink: 0;
  }
  .status-indicator {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    transition: color 0.3s;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-indicator[data-status="ready"] .status-dot { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
  .status-indicator[data-status="ready"] { color: var(--cyan); }
  .status-indicator[data-status="listening"] .status-dot { background: var(--success); box-shadow: 0 0 12px var(--success); animation: blink 1s infinite; }
  .status-indicator[data-status="listening"] { color: var(--success); }
  .status-indicator[data-status="thinking"] .status-dot { background: #ffaa00; box-shadow: 0 0 12px #ffaa00; animation: blink 0.6s infinite; }
  .status-indicator[data-status="thinking"] { color: #ffaa00; }
  .status-indicator[data-status="speaking"] .status-dot { background: var(--cyan); box-shadow: 0 0 12px var(--cyan); animation: blink 0.8s infinite; }
  .status-indicator[data-status="speaking"] { color: var(--cyan); }
  .status-indicator[data-status="error"] .status-dot { background: var(--danger); box-shadow: 0 0 12px var(--danger); }
  .status-indicator[data-status="error"] { color: var(--danger); }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── Conversation area ── */
  .conversation {
    position: relative; z-index: 10;
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    mask-image: linear-gradient(to bottom, transparent 0%, black 5%, black 95%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 5%, black 95%, transparent 100%);
  }
  .conversation::-webkit-scrollbar { width: 3px; }
  .conversation::-webkit-scrollbar-track { background: transparent; }
  .conversation::-webkit-scrollbar-thumb { background: var(--cyan-dim); border-radius: 3px; }

  .msg {
    max-width: 85%;
    margin-bottom: 12px;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 0.9rem;
    line-height: 1.5;
    animation: msgIn 0.3s ease-out;
    position: relative;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    margin-left: auto;
    background: linear-gradient(135deg, #0d2847, #0a1e3a);
    border: 1px solid #1a3a6a;
    border-radius: 12px 12px 4px 12px;
    color: #e0f0ff;
  }
  .msg.assistant {
    margin-right: auto;
    background: linear-gradient(135deg, #0f1a2e, #0d1528);
    border: 1px solid var(--bg-card-border);
    border-radius: 12px 12px 12px 4px;
  }
  .msg .role {
    font-family: 'Orbitron', monospace;
    font-size: 0.55rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .msg.user .role { color: var(--blue); text-align: right; }
  .msg.assistant .role { color: var(--cyan); }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    text-align: center;
    font-size: 0.85rem;
    gap: 8px;
    opacity: 0.6;
  }
  .empty-state .icon { font-size: 2rem; }

  /* ── Button area ── */
  .button-area {
    position: relative; z-index: 10;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 16px 28px;
    gap: 10px;
  }

  .talk-btn {
    position: relative;
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 2px solid var(--cyan);
    background: radial-gradient(circle at 40% 35%, #0d2a4a, #060d1a);
    cursor: pointer;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s, border-color 0.3s, box-shadow 0.3s;
    box-shadow:
      0 0 20px var(--cyan-dim),
      0 0 60px #00d4ff11,
      inset 0 0 30px #00d4ff11;
  }
  .talk-btn:hover {
    transform: scale(1.04);
    box-shadow:
      0 0 30px var(--cyan-glow),
      0 0 80px #00d4ff22,
      inset 0 0 40px #00d4ff18;
  }
  .talk-btn:active { transform: scale(0.97); }

  .talk-btn .btn-icon {
    font-size: 2rem;
    color: var(--cyan);
    transition: color 0.3s;
    line-height: 1;
  }
  .talk-btn .btn-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.5rem;
    letter-spacing: 2px;
    color: var(--cyan);
    margin-top: 4px;
    text-transform: uppercase;
  }

  /* Pulse rings when listening */
  .talk-btn::before,
  .talk-btn::after {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px solid var(--cyan);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .talk-btn::after { inset: -18px; }

  .talk-btn.listening {
    border-color: var(--success);
    box-shadow:
      0 0 40px #00ff8844,
      0 0 100px #00ff8822,
      inset 0 0 40px #00ff8818;
    animation: btnPulse 1.5s ease-in-out infinite;
  }
  .talk-btn.listening .btn-icon,
  .talk-btn.listening .btn-label { color: var(--success); }
  .talk-btn.listening::before {
    opacity: 0.4;
    border-color: var(--success);
    animation: ring 2s ease-out infinite;
  }
  .talk-btn.listening::after {
    opacity: 0.2;
    border-color: var(--success);
    animation: ring 2s ease-out 0.5s infinite;
  }

  .talk-btn.thinking {
    border-color: #ffaa00;
    box-shadow: 0 0 30px #ffaa0044, inset 0 0 30px #ffaa0011;
    animation: btnPulse 0.8s ease-in-out infinite;
  }
  .talk-btn.thinking .btn-icon,
  .talk-btn.thinking .btn-label { color: #ffaa00; }

  .talk-btn.speaking {
    border-color: var(--cyan);
    animation: btnPulse 1.2s ease-in-out infinite;
    box-shadow:
      0 0 40px var(--cyan-glow),
      0 0 100px #00d4ff22,
      inset 0 0 40px #00d4ff18;
  }

  @keyframes btnPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }
  @keyframes ring {
    0% { transform: scale(1); opacity: 0.4; }
    100% { transform: scale(1.5); opacity: 0; }
  }

  .talk-btn.disabled {
    opacity: 0.4;
    pointer-events: none;
  }

  .hint {
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* ── Config modal ── */
  .config-toggle {
    position: fixed;
    top: 12px; right: 12px;
    z-index: 100;
    background: none;
    border: 1px solid var(--bg-card-border);
    color: var(--text-dim);
    font-size: 1.1rem;
    width: 36px; height: 36px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, color 0.2s;
  }
  .config-toggle:hover { border-color: var(--cyan); color: var(--cyan); }

  .config-overlay {
    position: fixed; inset: 0;
    background: #000000aa;
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .config-overlay.open { display: flex; }

  .config-panel {
    background: var(--bg-card);
    border: 1px solid var(--bg-card-border);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 400px;
    animation: msgIn 0.2s ease-out;
  }
  .config-panel h2 {
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    letter-spacing: 3px;
    color: var(--cyan);
    margin-bottom: 16px;
  }
  .config-panel label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .config-panel input, .config-panel select {
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 14px;
    background: var(--bg);
    border: 1px solid var(--bg-card-border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Rajdhani', monospace;
    font-size: 0.85rem;
    outline: none;
  }
  .config-panel input:focus, .config-panel select:focus { border-color: var(--cyan); }
  .config-panel .save-btn {
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, #003366, #001a33);
    border: 1px solid var(--cyan);
    border-radius: 8px;
    color: var(--cyan);
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .config-panel .save-btn:hover { background: linear-gradient(135deg, #004488, #002244); }

  /* ── Waveform visualizer ── */
  .waveform {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    height: 24px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .waveform.active { opacity: 1; }
  .waveform .bar {
    width: 3px;
    background: var(--cyan);
    border-radius: 2px;
    animation: wave 1s ease-in-out infinite;
  }
  .waveform .bar:nth-child(1) { animation-delay: 0s; height: 8px; }
  .waveform .bar:nth-child(2) { animation-delay: 0.1s; height: 14px; }
  .waveform .bar:nth-child(3) { animation-delay: 0.2s; height: 20px; }
  .waveform .bar:nth-child(4) { animation-delay: 0.3s; height: 14px; }
  .waveform .bar:nth-child(5) { animation-delay: 0.4s; height: 8px; }
  .waveform .bar:nth-child(6) { animation-delay: 0.15s; height: 16px; }
  .waveform .bar:nth-child(7) { animation-delay: 0.35s; height: 10px; }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.4); }
    50% { transform: scaleY(1); }
  }

  /* ── Scanline effect ── */
  .scanline {
    position: fixed; inset: 0;
    z-index: 1;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      #00d4ff03 2px,
      #00d4ff03 4px
    );
    opacity: 0.3;
  }

  /* ── Responsive ── */
  @media (min-width: 600px) {
    .talk-btn { width: 150px; height: 150px; }
    .talk-btn .btn-icon { font-size: 2.5rem; }
    .talk-btn .btn-label { font-size: 0.55rem; }
    .header h1 { font-size: 1.4rem; }
    .msg { max-width: 70%; }
  }

  /* safe area for notched phones */
  @supports (padding-top: env(safe-area-inset-top)) {
    .header { padding-top: calc(20px + env(safe-area-inset-top)); }
    .button-area { padding-bottom: calc(28px + env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="scanline"></div>

<button class="config-toggle" onclick="toggleConfig()" title="Settings">⚙</button>

<div class="config-overlay" id="configOverlay">
  <div class="config-panel">
    <h2>⚡ Configuration</h2>
    <label>OpenClaw Gateway URL</label>
    <input type="url" id="cfgUrl" placeholder="http://localhost:3033">
    <label>API Token (Bearer)</label>
    <input type="password" id="cfgToken" placeholder="Optional auth token">
    <label>TTS Voice</label>
    <select id="cfgVoice"></select>
    <label>TTS Speed</label>
    <input type="range" id="cfgRate" min="0.5" max="2" step="0.1" value="1" style="padding:4px 0">
    <button class="save-btn" onclick="saveConfig()">SAVE &amp; CLOSE</button>
  </div>
</div>

<div class="header">
  <h1>Terry ⚡</h1>
  <div class="subtitle">Voice Assistant</div>
</div>

<div class="status-bar">
  <div class="status-indicator" id="status" data-status="ready">
    <span class="status-dot"></span>
    <span class="status-text">Ready</span>
  </div>
</div>

<div class="conversation" id="conversation">
  <div class="empty-state" id="emptyState">
    <div class="icon">⚡</div>
    <div>Tap the button to start talking</div>
  </div>
</div>

<div class="button-area">
  <div class="waveform" id="waveform">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </div>
  <button class="talk-btn" id="talkBtn" onclick="handleTalk()">
    <div class="btn-icon">🎤</div>
    <div class="btn-label">Talk</div>
  </button>
  <div class="hint">Tap to speak</div>
</div>

<script>
// ═══════════════════════════════════════════
// CONFIGURATION — edit these or use the ⚙ UI
// ═══════════════════════════════════════════
const DEFAULT_CONFIG = {
  gatewayUrl: 'http://localhost:3033',  // OpenClaw gateway
  token: '',                            // Bearer token (if required)
  voiceName: '',                        // TTS voice name (empty = default)
  rate: 1.0                             // TTS speed
};

// ═══════════════════════════════════════════

let config = { ...DEFAULT_CONFIG };
let state = 'idle'; // idle | listening | thinking | speaking
let recognition = null;
let currentUtterance = null;

// Load saved config
try {
  const saved = JSON.parse(localStorage.getItem('terry-config'));
  if (saved) config = { ...config, ...saved };
} catch(e) {}

// ── Status ──
function setStatus(s, text) {
  const el = document.getElementById('status');
  el.dataset.status = s;
  el.querySelector('.status-text').textContent = text;
}

// ── Conversation ──
function addMessage(role, text) {
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();

  const conv = document.getElementById('conversation');
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  msg.innerHTML = `<div class="role">${role === 'user' ? 'You' : 'Terry ⚡'}</div><div class="text">${escapeHtml(text)}</div>`;
  conv.appendChild(msg);
  conv.scrollTop = conv.scrollHeight;
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

// ── Speech Recognition ──
function startListening() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    setStatus('error', 'Speech not supported');
    alert('Speech Recognition is not supported in this browser. Try Chrome on Android or desktop.');
    return;
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';
  recognition.maxAlternatives = 1;

  state = 'listening';
  setStatus('listening', 'Listening...');
  document.getElementById('talkBtn').classList.add('listening');
  document.getElementById('waveform').classList.add('active');

  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    stopListeningUI();
    addMessage('user', transcript);
    sendToTerry(transcript);
  };

  recognition.onerror = (e) => {
    console.error('Speech error:', e.error);
    stopListeningUI();
    if (e.error === 'no-speech') {
      setStatus('ready', 'No speech detected — try again');
    } else if (e.error === 'not-allowed') {
      setStatus('error', 'Microphone access denied');
    } else {
      setStatus('error', `Error: ${e.error}`);
    }
    setTimeout(() => { if (state === 'idle') setStatus('ready', 'Ready'); }, 3000);
  };

  recognition.onend = () => {
    if (state === 'listening') {
      stopListeningUI();
      setStatus('ready', 'Ready');
    }
  };

  recognition.start();
}

function stopListeningUI() {
  state = 'idle';
  document.getElementById('talkBtn').classList.remove('listening');
  document.getElementById('waveform').classList.remove('active');
}

// ── Send to OpenClaw ──
async function sendToTerry(text) {
  state = 'thinking';
  setStatus('thinking', 'Thinking...');
  const btn = document.getElementById('talkBtn');
  btn.classList.add('thinking');

  try {
    const headers = { 'Content-Type': 'application/json' };
    if (config.token) headers['Authorization'] = `Bearer ${config.token}`;

    const res = await fetch(`${config.gatewayUrl}/api/chat`, {
      method: 'POST',
      headers,
      body: JSON.stringify({ message: text })
    });

    btn.classList.remove('thinking');

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();
    const reply = data.response || data.message || data.text || data.reply || JSON.stringify(data);

    addMessage('assistant', reply);
    speak(reply);
  } catch (err) {
    btn.classList.remove('thinking');
    console.error('API error:', err);
    const errMsg = `Connection error — check gateway URL in settings. (${err.message})`;
    addMessage('assistant', errMsg);
    setStatus('error', 'Connection error');
    state = 'idle';
    setTimeout(() => setStatus('ready', 'Ready'), 4000);
  }
}

// ── TTS ──
function speak(text) {
  state = 'speaking';
  setStatus('speaking', 'Speaking...');
  const btn = document.getElementById('talkBtn');
  btn.classList.add('speaking');

  // Strip markdown-like formatting for cleaner speech
  const clean = text.replace(/\*\*/g, '').replace(/[_*`#]/g, '').replace(/\n+/g, '. ');

  const utter = new SpeechSynthesisUtterance(clean);
  utter.rate = config.rate;
  utter.pitch = 1.0;

  // Try to find configured voice
  const voices = speechSynthesis.getVoices();
  if (config.voiceName) {
    const v = voices.find(v => v.name === config.voiceName);
    if (v) utter.voice = v;
  } else {
    // Default: prefer a male English voice
    const preferred = voices.find(v => v.lang.startsWith('en') && /male|daniel|david|james|google uk/i.test(v.name));
    if (preferred) utter.voice = preferred;
  }

  utter.onend = () => {
    btn.classList.remove('speaking');
    state = 'idle';
    setStatus('ready', 'Ready');
  };
  utter.onerror = () => {
    btn.classList.remove('speaking');
    state = 'idle';
    setStatus('ready', 'Ready');
  };

  currentUtterance = utter;
  speechSynthesis.cancel(); // cancel any queued
  speechSynthesis.speak(utter);
}

// ── Button handler ──
function handleTalk() {
  if (state === 'speaking') {
    // Stop speaking
    speechSynthesis.cancel();
    document.getElementById('talkBtn').classList.remove('speaking');
    state = 'idle';
    setStatus('ready', 'Ready');
    return;
  }
  if (state === 'listening') {
    // Stop listening
    if (recognition) recognition.stop();
    return;
  }
  if (state === 'thinking') return; // wait
  startListening();
}

// ── Config UI ──
function toggleConfig() {
  const overlay = document.getElementById('configOverlay');
  const isOpen = overlay.classList.contains('open');
  if (isOpen) {
    overlay.classList.remove('open');
  } else {
    document.getElementById('cfgUrl').value = config.gatewayUrl;
    document.getElementById('cfgToken').value = config.token;
    document.getElementById('cfgRate').value = config.rate;
    populateVoices();
    overlay.classList.add('open');
  }
}

function populateVoices() {
  const sel = document.getElementById('cfgVoice');
  sel.innerHTML = '<option value="">Default</option>';
  const voices = speechSynthesis.getVoices();
  voices.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.name;
    opt.textContent = `${v.name} (${v.lang})`;
    if (v.name === config.voiceName) opt.selected = true;
    sel.appendChild(opt);
  });
}

function saveConfig() {
  config.gatewayUrl = document.getElementById('cfgUrl').value.replace(/\/+$/, '') || DEFAULT_CONFIG.gatewayUrl;
  config.token = document.getElementById('cfgToken').value;
  config.voiceName = document.getElementById('cfgVoice').value;
  config.rate = parseFloat(document.getElementById('cfgRate').value) || 1.0;
  localStorage.setItem('terry-config', JSON.stringify(config));
  toggleConfig();
}

// Close config on overlay click
document.getElementById('configOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) toggleConfig();
});

// Populate voices (some browsers load async)
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = populateVoices;
}

// ── Keyboard shortcut (spacebar) ──
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault();
    handleTalk();
  }
});
</script>
</body>
</html>
