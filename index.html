<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a1a">
<link rel="manifest" href="manifest.json">
<title>Terry ⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a1a;color:#e0e0e0;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.scanline{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 4px);pointer-events:none;z-index:1}
header{text-align:center;padding:20px 16px 10px;position:relative;z-index:2}
header h1{font-family:'Orbitron',monospace;font-size:1.4rem;color:#00e5ff;text-shadow:0 0 20px rgba(0,229,255,.4)}
#status{font-size:.75rem;color:#888;margin-top:4px;letter-spacing:2px;text-transform:uppercase}
.chat{flex:1;overflow-y:auto;padding:10px 16px;position:relative;z-index:2;display:flex;flex-direction:column;gap:8px}
.msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:.9rem;line-height:1.4;animation:fadeIn .3s}
.msg.user{align-self:flex-end;background:rgba(0,229,255,.15);border:1px solid rgba(0,229,255,.3);color:#b0e8ff}
.msg.terry{align-self:flex-start;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#d0d0d0}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.controls{padding:20px 16px 40px;display:flex;flex-direction:column;align-items:center;gap:12px;position:relative;z-index:2}
#talkBtn{width:100px;height:100px;border-radius:50%;border:3px solid #00e5ff;background:rgba(0,229,255,.08);color:#00e5ff;font-family:'Orbitron',monospace;font-size:.65rem;font-weight:700;letter-spacing:1px;cursor:pointer;position:relative;transition:all .3s;text-transform:uppercase}
#talkBtn:active,#talkBtn.listening{border-color:#4caf50;color:#4caf50;background:rgba(76,175,80,.15);box-shadow:0 0 30px rgba(76,175,80,.3)}
#talkBtn.thinking{border-color:#ff9800;color:#ff9800;background:rgba(255,152,0,.1);box-shadow:0 0 30px rgba(255,152,0,.3)}
#talkBtn.speaking{border-color:#00e5ff;color:#00e5ff;background:rgba(0,229,255,.15);box-shadow:0 0 30px rgba(0,229,255,.4)}
#talkBtn::before{content:'';position:absolute;inset:-8px;border-radius:50%;border:1px solid rgba(0,229,255,.2);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.1);opacity:0}}
.settings-btn{position:fixed;top:12px;right:12px;background:none;border:none;color:#555;font-size:1.2rem;cursor:pointer;z-index:10}
.settings{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:20;padding:20px;overflow-y:auto}
.settings.open{display:block}
.settings h2{font-family:'Orbitron',monospace;color:#00e5ff;margin-bottom:16px;font-size:1rem}
.settings label{display:block;color:#999;font-size:.75rem;margin:12px 0 4px;text-transform:uppercase;letter-spacing:1px}
.settings input,.settings select{width:100%;padding:10px;background:#111;border:1px solid #333;color:#e0e0e0;border-radius:6px;font-size:.85rem}
.settings button{margin-top:20px;padding:10px 24px;background:#00e5ff;color:#000;border:none;border-radius:6px;font-weight:bold;cursor:pointer;font-size:.9rem}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="scanline"></div>
<button class="settings-btn" onclick="toggleSettings()">⚙</button>
<div class="settings" id="settingsPanel">
<h2>Settings</h2>
<label>Relay Server URL</label>
<input id="cfgRelay" placeholder="https://your-relay.trycloudflare.com">
<label>TTS Voice</label>
<select id="cfgVoice"></select>
<label>Speech Rate</label>
<input id="cfgRate" type="range" min="0.5" max="2" step="0.1" value="1">
<button onclick="saveSettings()">Save & Close</button>
</div>
<header>
<h1>TERRY ⚡</h1>
<div id="status">Ready</div>
</header>
<div class="chat" id="chat"></div>
<div class="controls">
<button id="talkBtn" onclick="startListening()">TAP TO<br>TALK</button>
</div>
<script>
const DEFAULT_RELAY = 'https://parent-timeline-affordable-creative.trycloudflare.com';

let config = {
  relay: localStorage.getItem('terry_relay') || DEFAULT_RELAY,
  voice: localStorage.getItem('tts_voice') || '',
  rate: parseFloat(localStorage.getItem('tts_rate') || '1')
};

const btn = document.getElementById('talkBtn');
const statusEl = document.getElementById('status');
const chatEl = document.getElementById('chat');
let recognition = null;
// Init speech recognition
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    addMessage(text, 'user');
    setStatus('thinking');
    sendToTerry(text);
  };

  recognition.onend = () => {
    if (btn.classList.contains('listening')) {
      setStatus('thinking');
    }
  };

  recognition.onerror = (e) => {
    console.error('Speech error:', e.error);
    setStatus('ready');
    btn.classList.remove('listening');
    if (e.error === 'not-allowed') {
      addMessage('Microphone access denied. Please allow mic access in your browser settings.', 'terry');
    }
  };
} else {
  addMessage('Speech recognition not supported in this browser. Try Chrome.', 'terry');
}

function startListening() {
  if (!recognition) return;
  if (btn.classList.contains('listening')) {
    recognition.stop();
    btn.classList.remove('listening');
    setStatus('ready');
    return;
  }
  btn.classList.add('listening');
  btn.classList.remove('thinking', 'speaking');
  setStatus('listening');
  recognition.start();
}

function setStatus(state) {
  btn.className = '';
  const states = { ready: 'Ready', listening: 'Listening...', thinking: 'Thinking...', speaking: 'Speaking...' };
  statusEl.textContent = states[state] || state;
  if (state !== 'ready') btn.classList.add(state);
}

function addMessage(text, sender) {
  const div = document.createElement('div');
  div.className = `msg ${sender}`;
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}



async function sendToTerry(text) {
  try {
    const r = await fetch(`${config.relay}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    if (!r.ok) {
      addMessage('Connection error (' + r.status + '). Check settings.', 'terry');
      setStatus('ready');
      return;
    }
    const data = await r.json();
    const reply = data.reply || data.text || data.message || 'No response';
    addMessage(reply, 'terry');
    setStatus('speaking');
    speak(reply);
  } catch(e) {
    console.error('Send error:', e);
    addMessage('Cannot reach Terry. Make sure relay is running.', 'terry');
    setStatus('ready');
  }
}



function speak(text) {
  if (!('speechSynthesis' in window)) {
    setStatus('ready');
    return;
  }
  // Clean text for TTS
  const clean = text.replace(/[*_#`~\[\]]/g, '').replace(/https?:\/\/\S+/g, 'link').substring(0, 500);
  const u = new SpeechSynthesisUtterance(clean);
  u.rate = config.rate;
  
  // Try to find configured voice
  const voices = speechSynthesis.getVoices();
  if (config.voice) {
    const v = voices.find(v => v.name === config.voice);
    if (v) u.voice = v;
  } else {
    // Default: prefer a male English voice
    const male = voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('male'));
    const english = voices.find(v => v.lang.startsWith('en'));
    u.voice = male || english || voices[0];
  }
  
  u.onend = () => setStatus('ready');
  u.onerror = () => setStatus('ready');
  speechSynthesis.speak(u);
}

// Settings
function toggleSettings() {
  const p = document.getElementById('settingsPanel');
  p.classList.toggle('open');
  if (p.classList.contains('open')) {
    document.getElementById('cfgRelay').value = config.relay;
    document.getElementById('cfgRate').value = config.rate;
    // Populate voices
    const sel = document.getElementById('cfgVoice');
    sel.innerHTML = '<option value="">Auto</option>';
    speechSynthesis.getVoices().forEach(v => {
      const o = document.createElement('option');
      o.value = v.name;
      o.textContent = `${v.name} (${v.lang})`;
      if (v.name === config.voice) o.selected = true;
      sel.appendChild(o);
    });
  }
}

function saveSettings() {
  config.relay = document.getElementById('cfgRelay').value.replace(/\/+$/, '');
  config.voice = document.getElementById('cfgVoice').value;
  config.rate = parseFloat(document.getElementById('cfgRate').value);
  localStorage.setItem('terry_relay', config.relay);
  localStorage.setItem('tts_voice', config.voice);
  localStorage.setItem('tts_rate', config.rate);
  document.getElementById('settingsPanel').classList.remove('open');
}

// Load voices
speechSynthesis.onvoiceschanged = () => {};

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.target.matches('input,textarea')) {
    e.preventDefault();
    startListening();
  }
});

// Init
</script>
</body>
</html>
